[build]
builder = "nixpacks"

[deploy]
startCommand = "prisma generate && prisma migrate resolve --applied 20260706_bom_status_update 2>/dev/null; prisma migrate resolve --applied 20260706_task_multi_assignee 2>/dev/null; prisma migrate resolve --applied 20260712_gantt_rebuild 2>/dev/null; prisma migrate resolve --applied 20260712_gantt_phase2 2>/dev/null; prisma migrate deploy && npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
